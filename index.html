<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rancho do Robinho 2 - Sugestões</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --laranja: #e28f42;
            --creme: #fff5e1;
            --marrom: #3e2723;
            --verde: #2e8b57;
            --preto: #000;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: var(--marrom);
            /* Segunda imagem como fundo fixo e que cobre tudo */
            background-image: url('capa 2.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        /* Banner Superior (Primeira Imagem - ATUALIZADO) */
        .header-banner {
            background-color: var(--preto);
            text-align: center;
            position: relative;
            /* Dimensões muito menores: 1200x150 pixels */
            max-width: 1200px;
            height: 150px; /* Redução radical da altura */
            margin: 0 auto;
            overflow: hidden;
            border-bottom: 2px solid var(--laranja); /* Linha divisória charmosa */
        }

        .img-banner {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Mostra a imagem inteira sem cortar */
            object-position: center; /* Centraliza a imagem */
            opacity: 0.6; /* Efeito esmaecido (60% de opacidade) */
        }

        .admin-login {
            position: absolute;
            top: 10px;
            right: 15px;
            display: flex;
            gap: 5px;
            background-color: rgba(255, 255, 255, 0.7);
            padding: 5px;
            border-radius: 5px;
        }

        .admin-login input {
            padding: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            width: 80px;
            font-size: 0.8rem;
        }

        /* Painel de Controle (Inalterado) */
        #painel-adm {
            display: none;
            background: white;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            border: 2px dashed var(--laranja);
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .input-novo-item {
            padding: 10px;
            width: 70%;
