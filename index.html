<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rancho do Robinho 2 - Lista de Presentes</title>
    <style>
        /* CSS RESET E ESTILOS BÁSICOS */
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #222; /* Fundo escuro de fallback */
        }

        /* 1. IMAGEM DE FUNDO ESMAECIDA (ROLLING) */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('rancho-novo.png'); /* Mude para o nome exato da sua imagem de fundo */
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Isso faz a imagem ficar parada enquanto o conteúdo rola */
            filter: brightness(1.0) opacity(0.8); /* Efeito esmaecido */
            z-index: -1;
        }

        /* 2. ÍCONE DE ENGRENAGEM (ADM) */
        .admin-login {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            text-decoration: none;
            z-index: 1000;
            cursor: pointer;
            border: none;
        }

        /* 3. CONTAINER PRINCIPAL BRANCO (AJUSTADO PARA MOBILE) */
        .container {
            width: 90%; /* Ocupa 90% da largura da tela */
            max-width: 600px; /* Não passa de 600px em telas grandes */
            margin: 30px auto; /* Centraliza e dá espaçamento superior/inferior */
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 20px; /* Diminuído padding para mobile */
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            position: relative;
            box-sizing: border-box;
        }

        /* 4. LOGO METÁLICO (NO LUGAR DO TEXTO H1) */
        .logo-imagem {
            max-width: 100%; /* Adapta ao container */
            height: auto;
            margin-bottom: 5px;
        }

        /* Frase Original */
        .subtitle {
            font-size: 1.1rem;
            font-style: italic;
            color: #795548;
            margin-top: 0;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        hr {
            border: 0;
            border-top: 1px solid #ddd;
            margin: 20px 0;
        }

        /* 5. LISTA DE PRESENTES */
        .gift-section {
            text-align: left;
            margin: 20px 0;
        }

        .gift-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        select {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            color: #555;
            box-sizing: border-box;
        }

        /* Formulário de Reserva */
        .reservation-box {
            background: #fdfaf8;
            padding: 20px;
            border-radius: 8px;
            margin-top: 25px;
        }

        .reservation-box h4 {
            color: #333;
            margin-bottom: 10px;
        }

        .reservation-box p {
            font-size: 0.9rem;
            color: #666;
            margin-top: 0;
        }

        input[type="email"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        /* Botão Original */
        button {
            background-color: #5d4037; /* Cor marrom original */
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: background 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background-color: #3e2723;
        }

        /* 6. RODAPÉ COM ANO 2026 */
        footer {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #888;
        }

        /* AJUSTES ESPECÍFICOS PARA MOBILE */
        @media (max-width: 480px) {
            .container {
                margin: 20px auto; /* Margem menor no mobile */
                padding: 20px 15px; /* Padding interno menor */
            }
            
            .subtitle {
                font-size: 1rem; /* Diminui um pouco a fonte */
            }

            .logo-imagem {
                margin-bottom: 10px;
            }

            button {
                width: 100%; /* Botão ocupa toda a largura no mobile */
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="background-container"></div>

    <a class="admin-login" title="Área do Administrador">
        ⚙️
    </a>

    <div class="container">
        
        <img src="rancho-logo.png" alt="Rancho do Robinho 2" class="logo-imagem">

        <p class="subtitle">"Venha celebrar comigo essa data importante!"</p>
        
        <hr>

        <div class="gift-section">
            <h3>Sugestão para presentes</h3>
            <p>Escolha um item da lista que gostaria de presentear:</p>

            <select id="presente">
                <option value="" disabled selected>Selecione um presente...</option>
                <option value="kit-churrasco">Kit Churrasco Completo</option>
                <option value="rede-descanso">Rede de Descanso Rústica</option>
                <option value="jogo-pratos">Jogo de Pratos Decorativos</option>
                <option value="caixa-termica">Caixa Térmica 45L</option>
            </select>
        </div>

        <div class="reservation-box">
            <h4>Reserve abaixo o seu presente</h4>
            <p><small>Enviaremos um lembrete para o seu e-mail.</small></p>
            
            <input type="email" id="emailConvidado" placeholder="Seu melhor e-mail" required>
            <br><br>
            <button type="button">RESERVAR AGORA</button>
        </div>

        <footer>
            © 2026 Rancho do Robinho 2 - Todos os direitos reservados.
        </footer>
    </div>

</body>
</html>
