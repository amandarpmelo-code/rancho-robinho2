<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rancho do Robinho 2 - Sugestões</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --laranja: #e28f42; --marrom: #3e2723; --verde: #2e8b57; }
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif;
            background: url('capa 2.jpeg') no-repeat center center fixed;
            background-size: cover; color: var(--marrom);
        }
        .mural {
            max-width: 550px; margin: 40px auto;
            background: rgba(255, 255, 255, 0.92);
            padding: 25px; border-radius: 15px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .logo-mural { max-width: 180px; margin-bottom: 10px; }
        h1 { color: var(--laranja); font-size: 1.8rem; margin-bottom: 20px; }
        
        .item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid #ddd; text-align: left;
        }
        .item.reservado { color: #888; }
        .item.reservado span { text-decoration: line-through; }

        .status-ponto {
            display: inline-block; width: 10px; height: 10px;
            border-radius: 50%; margin-left: 8px;
        }
        .disponivel { background: var(--verde); }
        .indisponivel { background: #888; }

        button { padding: 10px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-res { background: var(--verde); color: white; }
        .btn-res:disabled { background: #bbb; cursor: not-allowed; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; }
        .modal-content { background: white; width: 90%; max-width: 350px; margin: 100px auto; padding: 20px; border-radius: 10px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }

        /* Estilo para o ADM ver os botões de apagar */
        .btn-del { background: #ff4d4d; color: white; margin-left: 5px; display: none; }
    </style>
</head>
<body>

    <div class="mural">
        <img src="image_8d9fc4.png" class="logo-mural" alt="Rancho do Robinho 2">
        <h1>Sugestões do Xerife</h1>
        
        <div id="lista-presentes"></div>
        
        <p style="margin-top:20px; font-size: 0.9rem;">
            <a href="#" onclick="recuperar()">Esqueceu o que reservou? Clique aqui</a>
        </p>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>Reservar Item</h3>
            <input type="text" id="nome-con" placeholder="Seu Nome">
            <input type="email" id="email-con" placeholder="Seu E-mail">
            <button class="btn-res" onclick="confirmar()">Confirmar</button>
            <button onclick="fechar()" style="background:none; color:#888;">Cancelar</button>
        </div>
    </div>

    <script>
        // Use o seu link do Firebase aqui
        const firebaseConfig = { databaseURL: "COLE_AQUI_O_LINK_DO_SEU_DATABASE" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let idSelecionado = null;

        function fechar() { document.getElementById('modal').style.display = 'none'; }
        function abrir(id) { idSelecionado = id; document.getElementById('modal').style.display = 'block'; }

        function confirmar() {
            const nome = document.getElementById('nome-con').value;
            const email = document.getElementById('email-con').value;
            if(nome && email) {
                db.ref('presentes/' + idSelecionado).update({
                    reservado: true,
                    nomeReservado: nome,
                    emailReservado: email
                });
                fechar();
                alert("Reserva concluída!");
            } else { alert("Preencha os dados!"); }
        }

        // Desenha a lista (Ajustado para NÃO mostrar o nome de quem reservou para o público)
        db.ref('presentes').on('value', (snap) => {
            const lista = document.getElementById('lista-presentes');
            lista.innerHTML = "";
            snap.forEach((item) => {
                const p = item.val();
                const id = item.key;
                const div = document.createElement('div');
                div.className = `item ${p.reservado ? 'reservado' : ''}`;
                
                div.innerHTML = `
                    <span>
                        ${p.nome} 
                        <span class="status-ponto ${p.reservado ? 'indisponivel' : 'disponivel'}"></span>
                    </span>
                    <button class="btn-res" ${p.reservado ? 'disabled' : ''} onclick="abrir('${id}')">
                        ${p.reservado ? 'Reservado' : 'Reservar'}
                    </button>
                `;
                lista.appendChild(div);
            });
        });

        function recuperar() {
            const email = prompt("Digite seu e-mail:");
            if(email) {
                db.ref('presentes').once('value', (snap) => {
                    let meus = [];
                    snap.forEach(i => { if(i.val().emailReservado === email) meus.push(i.val().nome); });
                    alert(meus.length ? "Você reservou: " + meus.join(", ") : "Nenhuma reserva para este e-mail.");
                });
            }
        }
    </script>
</body>
</html>
