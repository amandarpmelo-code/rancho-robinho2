
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rancho do Robinho 2 - Lista de Presentes</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
        }

        /* FUNDO: Garante que a imagem apareça e não fique preto */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('rancho-novo.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.5); 
            z-index: -1;
        }

        .admin-login {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px;
            border-radius: 50%;
            z-index: 1000;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            font-size: 18px;
        }

        .container {
            width: 90%;
            max-width: 450px;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.98);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo-imagem {
            max-width: 100%;
            height: auto;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1rem;
            font-style: italic;
            color: #5d4037;
            margin-bottom: 20px;
        }

        select, input[type="email"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .reservation-box {
            background: #f9f6f2;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        button.btn-reserva {
            background-color: #5d4037;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            text-transform: uppercase;
        }

        footer {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="background-container"></div>

    <button class="admin-login" onclick="editarLista()">⚙️</button>

    <div class="container">
        <img src="rancho-logo-solo.png" alt="Logo" class="logo-imagem">

        <p class="subtitle">"Venha celebrar comigo essa data importante!"</p>
        
        <hr style="opacity: 0.1;">

        <div style="text-align: left;">
            <label><strong>Sugestão para presentes</strong></label>
            <select id="selectPresentes">
                <option>Selecione um presente...</option>
                <option>Kit Churrasco</option>
                <option>Jogo de Pratos</option>
                <option>Bota de Couro</option>
            </select>
        </div>

        <div class="reservation-box">
            <p><strong>Reserve abaixo o seu presente</strong></p>
            <p style="font-size: 0.8rem;">Enviaremos um lembrete para o seu e-mail.</p>
            
            <input type="email" id="emailConvidado" placeholder="Seu melhor e-mail" required>
            <button class="btn-reserva" onclick="confirmarReserva()">RESERVAR AGORA</button>
        </div>

        <footer>© 2026 Rancho do Robinho 2 - Todos os direitos reservados.</footer>
    </div>

    <script>
        // Função para o Administrador editar a lista
        function editarLista() {
            const senhaDefinida = "robinho2026"; // VOCÊ PODE MUDAR A SENHA AQUI
            let senhaDigitada = prompt("Digite a senha do administrador:");

            if (senhaDigitada === senhaDefinida) {
                let acao = prompt("Senha correta! O que deseja fazer?\n1 - Adicionar presente\n2 - Limpar lista");
                
                if (acao === "1") {
                    let novoPresente = prompt("Digite o nome do novo presente:");
                    if (novoPresente) {
                        let select = document.getElementById("selectPresentes");
                        let option = document.createElement("option");
                        option.text = novoPresente;
                        select.add(option);
                        alert("Presente adicionado com sucesso!");
                    }
                } else if (acao === "2") {
                    document.getElementById("selectPresentes").innerHTML = "<option>Selecione um presente...</option>";
                    alert("Lista limpa!");
                }
            } else if (senhaDigitada !== null) {
                alert("Senha incorreta!");
            }
        }

        // Função simples para o botão de reserva
        function confirmarReserva() {
            const email = document.getElementById("emailConvidado").value;
            const presente = document.getElementById("selectPresentes").value;

            if (email === "" || presente === "Selecione um presente...") {
                alert("Por favor, escolha um presente e digite seu e-mail.");
            } else {
                alert("Obrigado! O item '" + presente + "' foi reservado. Enviamos os detalhes para " + email);
            }
        }
    </script>

</body>
</html>
