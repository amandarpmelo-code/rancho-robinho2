<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rancho do Robinho 2 - Lista de Presentes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Configurações de Fundo */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            min-height: 100vh;
            /* A imagem de fundo fica fixa enquanto o conteúdo rola */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('rancho-novo.png'); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        /* Ícone de Admin */
        .admin-access {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            z-index: 1000;
            color: rgba(255, 255, 255, 0.7);
            transition: 0.3s;
        }
        .admin-access:hover { color: #fff; transform: rotate(45deg); }

        /* Container Principal */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        .logo-header {
            max-width: 300px;
            margin-bottom: 20px;
        }

        h1 { font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        p.subtitle { font-size: 1.2em; margin-bottom: 40px; }

        /* Lista de Presentes */
        .gift-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .gift-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s;
        }

        .gift-card:hover { transform: translateY(-5px); }

        input[type="email"] {
            width: 80%;
            padding: 10px;
            margin: 15px 0;
            border-radius: 5px;
            border: none;
            outline: none;
        }

        .btn-reserve {
            background-color: #d4af37; /* Tom dourado cowboy */
            color: #000;
            border: none;
            padding: 12px 25px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-reserve:hover { background-color: #f1c40f; }

        /* Modal Simples para Admin */
        #admin-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #222;
            padding: 30px;
            border-radius: 10px;
            z-index: 2000;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div class="admin-access" onclick="openAdmin()">
        <i class="fas fa-cog"></i>
    </div>

    <div class="container">
        <img src="logo-rancho.png" alt="Logo Rancho do Robinho 2" class="logo-header">

        <h1>Venha celebrar comigo essa data importante!</h1>
        <p class="subtitle">Reserve abaixo o seu presente</p>

        <div class="gift-grid">
            <div class="gift-card">
                <h3>Kit Churrasco Premium</h3>
                <p>Sugestão para o Rancho</p>
                <input type="email" placeholder="Seu e-mail para não esquecer" required>
                <br>
                <button class="btn-reserve" onclick="confirmarReserva()">RESERVAR PRESENTE</button>
            </div>

            <div class="gift-card">
                <h3>Cooler Térmico Retro</h3>
                <p>Sugestão para o Rancho</p>
                <input type="email" placeholder="Seu e-mail para não esquecer" required>
                <br>
                <button class="btn-reserve" onclick="confirmarReserva()">RESERVAR PRESENTE</button>
            </div>
            
            </div>
    </div>

    <div id="admin-modal">
        <h3>Acesso Restrito</h3>
        <input type="password" id="admin-pass" placeholder="Digite a senha">
        <br><br>
        <button class="btn-reserve" onclick="checkPass()">Entrar</button>
        <button onclick="closeAdmin()" style="background:none; color:white; border:none; margin-left:10px; cursor:pointer;">Cancelar</button>
    </div>

    <script>
        function confirmarReserva() {
            alert("Reserva realizada! Enviamos os detalhes para o e-mail informado (Simulação).");
        }

        function openAdmin() {
            document.getElementById('admin-modal').style.display = 'block';
        }

        function closeAdmin() {
            document.getElementById('admin-modal').style.display = 'none';
        }

        function checkPass() {
            const pass = document.getElementById('admin-pass').value;
            if(pass === "1234") { // Defina sua senha aqui
                alert("Acesso liberado! Você pode editar os itens agora.");
                closeAdmin();
            } else {
                alert("Senha incorreta!");
            }
        }
    </script>
</body>
</html>
