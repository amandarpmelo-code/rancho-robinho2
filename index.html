<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rancho do Robinho 2 - Lista de Presentes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('rancho-novo.png'); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        .admin-access {
            position: fixed; top: 20px; right: 20px; font-size: 24px;
            cursor: pointer; z-index: 1000; color: rgba(255, 255, 255, 0.5);
        }

        .container {
            max-width: 900px; margin: 0 auto; padding: 40px 20px; text-align: center;
        }

        .logo-header {
            max-width: 280px; margin-bottom: 20px; filter: drop-shadow(2px 4px 6px black);
        }

        h1 { font-size: 2.2em; text-shadow: 2px 2px 4px #000; margin-bottom: 10px; }

        /* Botão Esqueci Presente */
        .btn-forgot {
            background: none; color: #d4af37; border: 1px solid #d4af37;
            padding: 10px 20px; cursor: pointer; border-radius: 25px;
            font-weight: bold; margin-bottom: 30px; transition: 0.3s;
        }
        .btn-forgot:hover { background: #d4af37; color: #000; }

        /* Painel Admin */
        #admin-panel {
            display: none; background: rgba(0, 0, 0, 0.9); padding: 20px;
            border-radius: 10px; margin-bottom: 30px; border: 1px dashed #d4af37;
        }

        /* Grid de Presentes */
        .gift-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px; margin-top: 10px;
        }

        .gift-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            padding: 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .gift-card.reserved { opacity: 0.6; border: 2px solid #ff4444; }
        .gift-card.reserved::after {
            content: "RESERVADO"; color: #ff4444; font-weight: bold;
            position: absolute; top: 15px; right: 15px; transform: rotate(15deg);
            border: 2px solid #ff4444; padding: 2px 8px;
        }

        input {
            padding: 12px; margin: 10px 0; border-radius: 5px; border: none; width: 85%;
        }

        .btn-reserve {
            background-color: #d4af37; color: #000; font-weight: bold;
            width: 85%; border-radius: 5px; cursor: pointer; border: none; padding: 12px;
        }

        .btn-reserve:disabled { background-color: #555; cursor: not-allowed; }

        .btn-delete { background-color: #ff4444; color: white; border: none; padding: 5px 10px; cursor: pointer; margin-bottom: 10px; }

        /* Modal Senha */
        #admin-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #222; padding: 30px; border-radius: 10px; z-index: 2000; text-align: center;
        }
    </style>
</head>
<body>

    <div class="admin-access" onclick="openModal()"><i class="fas fa-cog"></i></div>

    <div class="container">
        <img src="logo-rancho.png" alt="Logo Rancho" class="logo-header">
        <h1>Venha celebrar comigo essa data importante!</h1>
        <p>Reserve abaixo o seu presente</p>

        <button class="btn-forgot" onclick="consultarReserva()">
            <i class="fas fa-search"></i> Esqueci qual presente reservei
        </button>

        <div id="admin-panel">
            <h3>Painel do Anfitrião</h3>
            <input type="text" id="new-gift-name" placeholder="Nome do presente...">
            <br>
            <button onclick="addGift()" style="background: #28a745; color: white; padding: 10px; border: none; cursor:pointer;">Adicionar Item</button>
            <button onclick="logoutAdmin()" style="background: #555; color: white; padding: 10px; border: none; cursor:pointer;">Sair do Editor</button>
        </div>

        <div class="gift-grid" id="gift-list">
            <p>Carregando presentes...</p>
        </div>
    </div>

    <div id="admin-modal">
        <h3>Senha Admin</h3>
        <input type="password" id="admin-pass" placeholder="Senha">
        <br><br>
        <button class="btn-reserve" onclick="checkPass()">Entrar</button>
        <button onclick="closeModal()" style="color: white; background: none; border: none; cursor: pointer;">Voltar</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAIGya897hLJUDItH1VChjI6o_lswcbR-k",
            authDomain: "ranchodorobinhoo.firebaseapp.com",
            databaseURL: "https://ranchodorobinhoo-default-rtdb.firebaseio.com",
            projectId: "ranchodorobinhoo",
            storageBucket: "ranchodorobinhoo.firebasestorage.app",
            messagingSenderId: "16182783112",
            appId: "1:16182783112:web:5cb90270e276a60ded433d",
            measurementId: "G-YHVM1C80ZT"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let isAdmin = false;

        function renderGifts() {
            db.ref('presentes').on('value', (snapshot) => {
                const data = snapshot.val();
                const list = document.getElementById('gift-list');
                list.innerHTML = '';
                if (data) {
                    Object.keys(data).forEach(id => {
                        const gift = data[id];
                        const card = document.createElement('div');
                        card.className = `gift-card ${gift.reserved ? 'reserved' : ''}`;
                        card.innerHTML = `
                            ${isAdmin ? `<button class="btn-delete" onclick="deleteGift('${id}')">Excluir</button>` : ''}
                            <h3>${gift.name}</h3>
                            <input type="email" id="email-${id}" placeholder="Seu e-mail" ${gift.reserved ? 'disabled' : ''} value="${gift.email || ''}">
                            <button class="btn-reserve" onclick="reserveGift('${id}')" ${gift.reserved ? 'disabled' : ''}>
                                ${gift.reserved ? 'RESERVADO' : 'RESERVAR'}
                            </button>
                        `;
                        list.appendChild(card);
                    });
                }
            });
        }

        function consultarReserva() {
            const emailBusca = prompt("Digite o e-mail usado na reserva:");
            if (!emailBusca || !emailBusca.includes('@')) return alert("E-mail inválido.");
            
            db.ref('presentes').once('value', (snapshot) => {
                const data = snapshot.val();
                let encontrados = [];
                if (data) {
                    Object.keys(data).forEach(id => {
                        if (data[id].email && data[id].email.toLowerCase() === emailBusca.toLowerCase()) {
                            encontrados.push(data[id].name);
                        }
                    });
                }
                if (encontrados.length > 0) alert("Você reservou: " + encontrados.join(", "));
                else alert("Nenhuma reserva para este e-mail.");
            });
        }

        function addGift() {
            const name = document.getElementById('new-gift-name').value;
            if (name) {
                db.ref('presentes').push({ name: name, reserved: false, email: "" });
                document.getElementById('new-gift-name').value = '';
            }
        }

        function deleteGift(id) {
            if(confirm("Excluir item?")) db.ref('presentes/' + id).remove();
        }

        function reserveGift(id) {
            const email = document.getElementById(`email-${id}`).value;
            if (!email.includes('@')) return alert("E-mail obrigatório!");
            db.ref('presentes/' + id).update({ reserved: true, email: email });
            alert("Reserva confirmada!");
        }

        function checkPass() {
            if (document.getElementById('admin-pass').value === "1234") {
                isAdmin = true;
                document.getElementById('admin-panel').style.display = 'block';
                closeModal();
                renderGifts();
            } else alert("Senha incorreta!");
        }

        function openModal() { document.getElementById('admin-modal').style.display = 'block'; }
        function closeModal() { document.getElementById('admin-modal').style.display = 'none'; }
        function logoutAdmin() { isAdmin = false; document.getElementById('admin-panel').style.display = 'none'; renderGifts(); }

        renderGifts();
    </script>
</body>
</html>
