<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rancho do Robinho 2 - Sugestões</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --laranja: #e28f42; --marrom: #3e2723; --verde: #2e8b57; }
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif;
            background: url('capa 2.jpeg') no-repeat center center fixed;
            background-size: cover; color: var(--marrom);
        }
        .mural {
            max-width: 550px; margin: 30px auto;
            background: rgba(255, 255, 255, 0.94);
            padding: 25px; border-radius: 15px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .logo-site { max-width: 250px; height: auto; margin-bottom: 20px; }
        h1 { color: var(--laranja); font-size: 1.8rem; margin-top: 10px; }
        .item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid #ddd; text-align: left;
        }
        .item.reservado { color: #888; }
        .item.reservado span { text-decoration: line-through; }
        button { padding: 10px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-res { background: var(--verde); color: white; }
        .btn-res:disabled { background: #bbb; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="mural">
        <img src="logo-nova.png" class="logo-site" alt="Rancho do Robinho 2">
        <h1>Sugestões do Xerife</h1>
        <div id="lista-presentes"></div>
    </div>
    <script>
        // Verifique se o seu databaseURL está correto
        const firebaseConfig = { databaseURL: "https://seu-projeto-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        db.ref('presentes').on('value', (snap) => {
            const lista = document.getElementById('lista-presentes'); lista.innerHTML = "";
            snap.forEach((item) => {
                const p = item.val(); const id = item.key;
                lista.innerHTML += `
                    <div class="item ${p.reservado ? 'reservado' : ''}">
                        <span>${p.nome}</span>
                        <button class="btn-res" ${p.reservado ? 'disabled' : ''}>${p.reservado ? 'Reservado' : 'Reservar'}</button>
                    </div>`;
            });
        });
    </script>
</body>
</html>
