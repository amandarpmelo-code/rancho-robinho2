<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rancho do Robinho 2</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --laranja: #e28f42; --marrom: #3e2723; --verde: #2e8b57; }
        
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            /* Fundo com a imagem capa 2.jpeg e uma camada escura para dar leitura */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('capa 2.jpeg') no-repeat center center fixed;
            background-size: cover;
        }

        /* BARRA DE ADMIN NO TOPO */
        .topo-adm { 
            background: rgba(0,0,0,0.8); 
            padding: 10px; 
            text-align: right; 
            position: sticky; 
            top: 0; 
            z-index: 100;
        }
        .topo-adm input { padding: 5px; border-radius: 4px; border: none; width: 100px; margin-right: 5px; }

        .mural {
            max-width: 500px; 
            margin: 30px auto; 
            background: rgba(255, 255, 255, 0.92); 
            padding: 25px; 
            border-radius: 15px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        .logo-mural { width: 100%; max-width: 280px; margin-bottom: 15px; }
        
        #painel-adm { 
            display: none; 
            background: #fdf2e9; 
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            border: 2px dashed var(--laranja); 
        }

        .item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px; 
            border-bottom: 1px solid #ddd; 
            text-align: left;
        }
        .item.reservado span { text-decoration: line-through; color: #888; }
        
        button { padding: 10px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-res { background: var(--verde); color: white; }
        .btn-del { background: #ff4d4d; color: white; margin-left: 10px; display: none; }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        .modal-content { background: white; width: 85%; max-width: 320px; margin: 100px auto; padding: 25px; border-radius: 10px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="topo-adm">
        <input type="password" id="senha-adm" placeholder="Senha ADM">
        <button onclick="logar()" style="background: var(--laranja); color: white; font-size: 0.8rem;">Entrar</button>
    </div>

    <div class="mural">
        <img src="logo-rancho.png.jpeg" class="logo-mural" alt="Rancho do Robinho 2">
        
        <h1 style="color: var(--laranja); font-size: 1.6rem;">Sugestões do Xerife</h1>

        <div id="painel-adm">
            <input type="text" id="add-nome" placeholder="Nome do presente..." style="width: 80%;">
            <button onclick="adicionar()" style="background: var(--marrom); color: white; width: 100%; margin-top: 10px;">Adicionar Item</button>
        </div>
        
        <div id="lista"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>Reservar Item</h3>
            <input type="text" id="c-nome" placeholder="Seu Nome">
            <input type="email" id="c-email" placeholder="Seu E-mail">
            <button class="btn-res" onclick="confirmar()" style="width: 100%;">Confirmar Reserva</button>
            <button onclick="fechar()" style="background:none; color:#888; width: 100%; margin-top: 10px;">Cancelar</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://rancho-robinho2-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let sel = null;

        function logar() {
            if(document.getElementById('senha-adm').value === "robinho2") {
                document.getElementById('painel-adm').style.display = 'block';
                document.querySelectorAll('.btn-del').forEach(b => b.style.display = 'inline-block');
                alert("Acesso de Administrador ativado!");
            } else { alert("Senha incorreta!"); }
        }

        function adicionar() {
            const n = document.getElementById('add-nome').value;
            if(n) { db.ref('presentes').push({ nome: n, reservado: false }); document.getElementById('add-nome').value = ""; }
        }

        function fechar() { document.getElementById('modal').style.display = 'none'; }
        function abrir(id) { sel = id; document.getElementById('modal').style.display = 'block'; }

        function confirmar() {
            const n = document.getElementById('c-nome').value;
            const e = document.getElementById('c-email').value;
            if(n && e) { 
                db.ref('presentes/' + sel).update({ reservado: true, q: n, em: e }); 
                fechar(); 
            } else { alert("Preencha todos os campos!"); }
        }

        function remover(id) { if(confirm("Deseja apagar este item?")) db.ref('presentes/' + id).remove(); }

        db.ref('presentes').on('value', (snap) => {
            const l = document.getElementById('lista'); l.innerHTML = "";
            const isAdm = document.getElementById('painel-adm').style.display === 'block';
            snap.forEach((i) => {
                const p = i.val(); const id = i.key;
                const div = document.createElement('div');
                div.className = `item ${p.reservado ? 'reservado' : ''}`;
                div.innerHTML = `
                    <span>${p.nome} ${p.reservado && isAdm ? '<br><small>(Por: '+p.q+')</small>' : ''}</span>
                    <div>
                        <button class="btn-res" ${p.reservado ? 'disabled' : ''} onclick="abrir('${id}')">
                            ${p.reservado ? 'Reservado' : 'Reservar'}
                        </button>
                        <button class="btn-del" style="display: ${isAdm ? 'inline-block' : 'none'}" onclick="remover('${id}')">X</button>
                    </div>
                `;
                l.appendChild(div);
            });
        });
    </script>
</body>
</html>

<style>
    body {
        margin: 0; padding: 0;
        /* Garante que o fundo 'capa 2.jpeg' ocupe a tela toda e fique visível */
        background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('capa 2.jpeg') no-repeat center center fixed;
        background-size: cover;
    }
    .logo-mural { 
        width: 100%; 
        max-width: 280px; 
        margin: 0 auto 15px; 
        display: block; 
    }
</style>

<img src="logo-rancho.png" class="logo-mural" alt="Rancho do Robinho 2">
